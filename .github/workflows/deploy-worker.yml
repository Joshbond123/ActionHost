name: Deploy Worker

on:
  workflow_dispatch:
    inputs:
      project_id:
        required: true
        type: string
      deployment_id:
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout ActionHost
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deployment worker
        run: node scripts/deploy-worker.mjs
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          DEPLOYMENT_ID: ${{ inputs.deployment_id }}
          GITHUB_PAT: ${{ vars.ACTIONHOST_GITHUB_PAT }}
          ACTIONHOST_REPO_PATH: ${{ vars.ACTIONHOST_REPO_PATH }}
          SUPABASE_URL: ${{ vars.ACTIONHOST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ vars.ACTIONHOST_SUPABASE_SERVICE_ROLE_KEY }}
