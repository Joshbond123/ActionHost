name: ActionHost Deployment Worker

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: Repository URL to deploy
        required: true
      project_id:
        description: ActionHost project ID
        required: true
      deployment_id:
        description: Deployment ID
        required: true
      build_command:
        description: Build command
        required: false
        default: npm run build
      start_command:
        description: Start command
        required: false
        default: npm start

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          if [ -z "$GITHUB_PAT" ]; then
            echo "Missing GITHUB_PAT secret" >&2
            exit 1
          fi
          REPO_PATH=$(echo "${{ inputs.repo_url }}" | sed -E 's#https://github.com/##' | sed -E 's#\.git$##')
          git clone "https://${GITHUB_PAT}@github.com/${REPO_PATH}.git" target-app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd target-app && npm ci

      - name: Build application
        run: cd target-app && ${{ inputs.build_command }}

      - name: Mark deployment as ready in Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Supabase secrets missing; skip deployment status update."
            exit 0
          fi
          curl -sS -X PATCH "${SUPABASE_URL}/rest/v1/deployments?id=eq.${{ inputs.deployment_id }}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"status":"ready"}'
