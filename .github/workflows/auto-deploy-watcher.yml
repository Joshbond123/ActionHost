name: Auto Deploy Watcher

# Hybrid auto-deploy strategy:
#   PRIMARY: GitHub push webhooks deliver commit events instantly to the
#            `github-webhook` Supabase edge function (zero-latency redeploy).
#   FALLBACK: This cron-driven poller runs every 5 minutes to catch projects
#             whose repo couldn't have a webhook installed (e.g. PAT missing
#             admin:repo_hook scope, third-party repos without admin access,
#             or transient webhook delivery failures). Idempotent — only
#             dispatches when the latest SHA differs from last_deployed_sha.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout ActionHost
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run auto-deploy watcher
        run: node scripts/auto-deploy-watcher.mjs
        env:
          GITHUB_PAT: ${{ vars.ACTIONHOST_GITHUB_PAT }}
          ACTIONHOST_REPO_PATH: ${{ vars.ACTIONHOST_REPO_PATH }}
          SUPABASE_URL: ${{ vars.ACTIONHOST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ vars.ACTIONHOST_SUPABASE_SERVICE_ROLE_KEY }}
