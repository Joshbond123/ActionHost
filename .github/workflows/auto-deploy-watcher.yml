name: Auto Deploy Watcher

# Cron polling has been replaced by instant GitHub webhooks (see the
# `github-webhook` Supabase edge function and the registerGithubWebhook helper
# in the `deploy` function). This workflow remains available as a manual
# fallback in case a webhook is missed or temporarily fails.
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout ActionHost
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run auto-deploy watcher
        run: node scripts/auto-deploy-watcher.mjs
        env:
          GITHUB_PAT: ${{ vars.ACTIONHOST_GITHUB_PAT }}
          ACTIONHOST_REPO_PATH: ${{ vars.ACTIONHOST_REPO_PATH }}
          SUPABASE_URL: ${{ vars.ACTIONHOST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ vars.ACTIONHOST_SUPABASE_SERVICE_ROLE_KEY }}
