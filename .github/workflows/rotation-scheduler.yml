name: Rotation and Auto-Deploy Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate-and-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ActionHost
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Monitor commits and rotation
        run: node scripts/rotation-worker.mjs
        env:
          GITHUB_PAT: ${{ vars.ACTIONHOST_GITHUB_PAT }}
          ACTIONHOST_REPO_PATH: ${{ vars.ACTIONHOST_REPO_PATH }}
          SUPABASE_URL: ${{ vars.ACTIONHOST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ vars.ACTIONHOST_SUPABASE_SERVICE_ROLE_KEY }}
          ACTIONHOST_DEFAULT_TARGET_REPO: ${{ vars.ACTIONHOST_DEFAULT_TARGET_REPO }}
          ACTIONHOST_DEFAULT_NGROK_DOMAIN: ${{ vars.ACTIONHOST_DEFAULT_NGROK_DOMAIN }}
          ACTIONHOST_DEFAULT_NGROK_AUTHTOKEN: ${{ vars.ACTIONHOST_DEFAULT_NGROK_AUTHTOKEN }}
