name: Rotation Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ActionHost
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run rotation logic
        run: node scripts/rotation-worker.mjs
        env:
          GITHUB_PAT: ${{ vars.ACTIONHOST_GITHUB_PAT }}
          ACTIONHOST_REPO_PATH: ${{ vars.ACTIONHOST_REPO_PATH }}
          SUPABASE_URL: ${{ vars.ACTIONHOST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ vars.ACTIONHOST_SUPABASE_SERVICE_ROLE_KEY }}
